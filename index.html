<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santi's Order System</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { background-color: #f3e8ff; background-image: radial-gradient(#d8b4fe 0.5px, transparent 0.5px); background-size: 15px 15px; font-family: 'Courier Prime', monospace; }
        .receipt { background: #fffdfa; border-radius: 2px; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.1); }
        .receipt::after { content: ""; position: absolute; bottom: -10px; left: 0; width: 100%; height: 10px; background: linear-gradient(-45deg, transparent 5px, #fffdfa 5px), linear-gradient(45deg, transparent 5px, #fffdfa 5px); background-size: 10px 20px; }
    </style>
</head>
<body class="p-4 flex justify-center items-start min-h-screen">
    <div class="receipt w-full max-w-md p-8 border-t-8 border-purple-400 mt-10">
        <h1 class="text-2xl font-bold text-center text-purple-600 mb-1 uppercase">Santi Virelinth</h1>
        <p class="text-center text-[10px] text-gray-500 mb-8 tracking-[0.2em]">EDITING SERVICE • PRICE LIST</p>

        <div id="items-container">
            <!-- STAMPS -->
            <div class="mb-6">
                <h2 class="bg-purple-100 text-purple-700 px-2 py-0.5 text-xs font-bold mb-3 inline-block">01 STAMPS/STIXX</h2>
                <div class="space-y-2 text-sm">
                    <label class="flex justify-between items-center cursor-pointer"><span class="flex items-center"><input type="checkbox" class="item-check mr-3 accent-purple-600" data-price="5" data-name="Stamps 1pc"> 1pc</span><span class="text-gray-400">----- 5gc</span></label>
                    <label class="flex justify-between items-center cursor-pointer"><span class="flex items-center"><input type="checkbox" class="item-check mr-3 accent-purple-600" data-price="7" data-name="Stamps 3pcs"> 3pcs</span><span class="text-gray-400">----- 7gc</span></label>
                    <label class="flex justify-between items-center cursor-pointer"><span class="flex items-center"><input type="checkbox" class="item-check mr-3 accent-purple-600" data-price="10" data-name="Stamps 5pcs"> 5pcs</span><span class="text-gray-400">---- 10gc</span></label>
                </div>
            </div>

            <!-- LAYOUTS -->
            <div class="mb-6 border-t border-dashed border-gray-200 pt-4">
                <h2 class="bg-purple-100 text-purple-700 px-2 py-0.5 text-xs font-bold mb-3 inline-block">03 LAYOUTS</h2>
                <div class="space-y-2 text-sm">
                    <label class="flex justify-between items-center cursor-pointer"><span class="flex items-center"><input type="checkbox" class="item-check mr-3 accent-purple-600" data-price="10" data-name="pfp + cp"> pfp + cp</span><span class="text-gray-400">---- 10gc</span></label>
                    <label class="flex justify-between items-center cursor-pointer"><span class="flex items-center"><input type="checkbox" class="item-check mr-3 accent-purple-600" data-price="20" data-name="pfp + cp + hl"> pfp + cp + hl</span><span class="text-gray-400">---- 20gc</span></label>
                </div>
            </div>
        </div>

        <div class="border-t-2 border-double border-gray-300 my-6 pt-4 flex justify-between items-center font-bold text-lg">
            <span>TOTAL:</span>
            <span class="text-purple-700"><span id="total-val">0</span> GC</span>
        </div>

        <button onclick="orderViaMessenger()" class="w-full bg-purple-600 text-white font-bold py-3 rounded hover:bg-purple-700 transition-all shadow-md active:scale-95">AVAIL NOW!</button>
        <p class="text-[9px] text-center mt-6 text-gray-400 uppercase tracking-widest">Thank you for availing ♡</p>
    </div>

    <script>
        const checks = document.querySelectorAll('.item-check');
        const totalDisp = document.getElementById('total-val');

        checks.forEach(c => {
            c.addEventListener('change', () => {
                let t = 0;
                checks.forEach(i => { if(i.checked) t += parseInt(i.dataset.price); });
                totalDisp.innerText = t;
            });
        });

        function orderViaMessenger() {
            let items = [];
            checks.forEach(i => { if(i.checked) items.push(i.dataset.name); });
            if(items.length === 0) return alert("Palihog pili og items!");
            
            let msg = `Hi Santi!\nI want to avail:\n\n${items.join('\n')}\n\nTotal: ${totalDisp.innerText}gc`;
            // USBA NI: Pulihi ang 'IMONG_USER' sa imong actual Messenger username
            window.open(`https://m.me/IMONG_USER?text=${encodeURIComponent(msg)}`, '_blank');
        }
    </script>
</body>
</html>
